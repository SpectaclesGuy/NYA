<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Instagram Scrape | NYA</title>
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/pages/nya.js?v=2" defer></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1F2A36",
              "warm-gray": "#F1EEE8",
              "navy-academic": "#1F2A36",
              charcoal: "#333333",
              "border-sep": "#E0DBD2",
              "accent-gold": "#C7A35A",
              parchment: "#FCFAF7",
            },
            fontFamily: {
              sans: ["Montserrat", "sans-serif"],
              serif: ["Montserrat", "serif"],
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        @apply bg-parchment text-primary;
        -webkit-font-smoothing: antialiased;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 20;
      }
      .hero-sheen {
        background: radial-gradient(
            900px 500px at 10% -30%,
            rgba(199, 163, 90, 0.2),
            transparent 60%
          ),
          radial-gradient(
            800px 500px at 90% -20%,
            rgba(31, 42, 54, 0.08),
            transparent 55%
          );
      }
      .field-input {
        @apply w-full border border-border-sep bg-white px-4 py-3 text-sm focus:border-primary focus:ring-primary;
      }
    </style>
    <link href="/pages/nya.css" rel="stylesheet" />
  </head>
  <body class="min-h-screen">
    <header class="sticky top-0 z-50 bg-white border-b border-warm-gray">
      <div class="max-w-[1400px] mx-auto px-8 h-20 flex items-center justify-between">
        <div class="flex items-center gap-16">
          <div class="flex items-center gap-3">
            <div class="flex items-center">
              <img alt="NYA logo" class="h-10 w-auto object-contain" src="/assets/nya_logo.png" />
            </div>
            <h1 class="text-sm font-semibold tracking-[0.2em] uppercase hidden md:block">
              NYA Community
            </h1>
          </div>
          <nav class="hidden md:flex items-center gap-10">
            <a class="text-xs font-semibold tracking-widest uppercase text-gray-400 hover:text-primary transition-colors" href="/main_dashboard">Discover</a>
            <a class="text-xs font-semibold tracking-widest uppercase text-gray-400 hover:text-primary transition-colors" href="/profile/setup">Update Profile</a>
            <a class="text-xs font-semibold tracking-widest uppercase text-gray-400 hover:text-primary transition-colors" href="/mentors">Prefects</a>
            <a class="text-xs font-semibold tracking-widest uppercase text-gray-400 hover:text-primary transition-colors" href="/requests">My Team</a>
            <a id="mentor-nav" class="hidden text-xs font-semibold tracking-widest uppercase text-gray-400 hover:text-primary transition-colors" href="/mentor/dashboard">Prefect Dashboard</a>
            <a id="admin-nav" class="hidden text-xs font-semibold tracking-widest uppercase text-gray-400 hover:text-primary transition-colors" href="/admin/users">Admin</a>
          </nav>
        </div>
        <div class="flex items-center gap-6">
          <button
            id="logout-button"
            class="hidden sm:inline-flex items-center gap-2 text-[10px] font-semibold uppercase tracking-[0.2em] text-gray-400 hover:text-primary transition-colors"
          >
            <span class="material-symbols-outlined text-[16px]">logout</span>
            Logout
          </button>
          <div class="h-6 w-[1px] bg-warm-gray"></div>
          <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block">
              <p class="text-[10px] font-bold uppercase tracking-tighter text-gray-400">Collaborator</p>
              <span id="nav-user-name" class="text-xs font-medium">Member</span>
            </div>
            <a
              id="nav-profile-link"
              class="w-10 h-10 rounded-full bg-cover bg-center border border-warm-gray"
              style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCXMAuFlpfGLb8YpJibsxtzbW83UZ6AareCHOsAxn3Nf94v-Nz39G_zgXq-K9q-IOgNC-XRxVBc2u0mc8wDa1O4aBFq0gysh8JdizlaWNWeUjtlUdSp1wbxB92BVSunOEYWOvQvPcdB_Ze_0LrVIh9NxR1-vyYotaH4MMbA8_8ZlfZOPRIjW3GsnLyJUVg7HQ_UhlQ7-eieV8mDRAmWLuQVbDb0UjADjJRw2fqW-2FIDDOX2NZEBF7aGVzk3CmAr5GeiGGCicRaQMk");'
              href="/profile"
              aria-label="View profile"
            ></a>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-8 py-16">
      <section class="hero-sheen rounded-2xl border border-border-sep px-10 py-12 mb-10">
        <p class="text-[10px] font-bold uppercase tracking-[0.35em] text-charcoal/40">Automation</p>
        <h2 class="text-5xl font-serif text-navy-academic mt-4">Instagram Scrape & Transcript</h2>
        <p class="text-lg text-charcoal/60 font-light mt-4 max-w-2xl leading-relaxed">
          Run an authenticated scrape job and send the combined transcript to your email when complete.
        </p>
      </section>

      <section class="bg-white border border-border-sep rounded-2xl p-8 md:p-10 shadow-[0_10px_30px_rgba(31,42,54,0.06)]">
        <form id="scrape-form" class="grid gap-6">
          <div class="grid gap-2">
            <label for="target_username" class="text-xs font-semibold uppercase tracking-[0.25em] text-charcoal/60">
              Target Username
            </label>
            <input id="target_username" class="field-input" placeholder="example.agency" required />
          </div>

          <div class="grid gap-2">
            <label for="recipient_email" class="text-xs font-semibold uppercase tracking-[0.25em] text-charcoal/60">
              Recipient Email
            </label>
            <input
              id="recipient_email"
              type="email"
              class="field-input"
              placeholder="name@example.com"
              required
            />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="grid gap-2">
              <label for="start_at_post_index" class="text-xs font-semibold uppercase tracking-[0.25em] text-charcoal/60">
                Start At Post Index
              </label>
              <input id="start_at_post_index" type="number" min="0" value="0" class="field-input" />
            </div>
            <div class="grid gap-2">
              <label for="max_videos_to_process" class="text-xs font-semibold uppercase tracking-[0.25em] text-charcoal/60">
                Max Videos
              </label>
              <input id="max_videos_to_process" type="number" min="1" value="1" class="field-input" />
            </div>
          </div>

          <div class="flex items-center gap-4 pt-2">
            <button
              id="submit-btn"
              class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-white text-[11px] font-semibold uppercase tracking-[0.25em] hover:opacity-90 transition-opacity"
              type="submit"
            >
              <span class="material-symbols-outlined text-[16px]">play_arrow</span>
              Run Scrape
            </button>
            <p class="text-xs text-charcoal/55"><code></code>.</p>
          </div>
        </form>

        <pre
          id="result"
          class="mt-8 bg-primary text-white rounded-xl p-4 text-xs overflow-auto hidden min-h-[140px]"
        ></pre>
      </section>
    </main>

    <script>
      const form = document.getElementById('scrape-form');
      const result = document.getElementById('result');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        result.classList.add('hidden');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Running...';

        const payload = {
          target_username: document.getElementById('target_username').value.trim(),
          recipient_email: document.getElementById('recipient_email').value.trim(),
          start_at_post_index: Number(document.getElementById('start_at_post_index').value || 0),
          max_videos_to_process: Number(document.getElementById('max_videos_to_process').value || 1),
        };

        try {
          const response = await fetch('/api/scrape/instagram', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data?.detail || data?.error?.message || 'Scrape failed');
          }
          result.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          result.textContent = `Error: ${error.message}`;
        } finally {
          result.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span class="material-symbols-outlined text-[16px]">play_arrow</span> Run Scrape';
        }
      });
    </script>
  </body>
</html>
